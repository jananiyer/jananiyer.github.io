<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pastry Portfolio | Janani Iyer</title>
  <link rel="icon" href="images/Favicon.jpg" type="image/jpeg" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --dark: #3a3a3a;
      --light: #ffffff;
      --accent: #c0392b;
      --text: #333333;
      --bg: #ede8e0;
      --nav-height: 80px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      color: var(--text);
      background: var(--bg);
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-height);
      background: var(--light);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      z-index: 100;
      border-bottom: 1px solid #e8e8e8;
    }

    .nav-logo img { height: 52px; width: auto; }

    .nav-links {
      display: flex;
      gap: 36px;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--text);
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.08em;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--accent); }

    /* HEADER */
    .portfolio-header {
      margin-top: var(--nav-height);
      padding: 60px 20px 40px;
      text-align: center;
      background: var(--bg);
    }

    .portfolio-header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 48px;
      color: var(--dark);
      margin-bottom: 8px;
    }

    .portfolio-header p {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #777;
    }

    /* GALLERY */
    .gallery {
      column-count: 2;
      column-gap: 6px;
      width: 1200px;
      margin: 0 auto;
      padding: 6px 0;
    }

    .gallery img {
      width: 100%;
      display: block;
      margin-bottom: 6px;
      break-inside: avoid;
    }

    .gallery-final-row {
      display: flex;
      gap: 6px;
      width: 1200px;
      margin: 0 auto;
      padding: 0 0 6px 0;
      align-items: flex-start;
    }

    .gallery-final-row img {
      width: 50%;
      display: block;
    }

    .gallery-thankyou {
      width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px 0;
    }

    .gallery-text {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 36px;
      color: var(--dark);
      text-align: center;
    }

    /* CONTACT ICONS */
    .portfolio-contact {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 60px 20px 60px;
    }

    .icon-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--dark);
      transition: background 0.2s;
      text-decoration: none;
    }

    .icon-btn:hover { background: #555; }

    .icon-btn svg { width: 20px; height: 20px; fill: #fff; }

    /* FOOTER */
    footer {
      background: var(--dark);
      color: #aaa;
      text-align: center;
      padding: 20px;
      font-size: 12px;
      letter-spacing: 0.08em;
    }

    @media (max-width: 600px) {
      nav { padding: 0 20px; }
      .gallery { column-count: 1; width: 100%; padding: 6px 20px; }
    }
  </style>
</head>
